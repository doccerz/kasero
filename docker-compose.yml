services:
    db:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${DATABASE_USER:-postgres}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
            POSTGRES_DB: ${DATABASE_NAME:-kasero}
        ports:
            - "30035:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-kasero}"]
            interval: 5s
            timeout: 5s
            retries: 10

    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: runner
        restart: unless-stopped
        env_file: .env
        environment:
            TZ: Asia/Manila
            NODE_ENV: production
            MIGRATIONS_PATH: /app/drizzle/migrations
        ports:
            - "${API_PORT:-3001}:3001"
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

    web:
        build:
            context: .
            dockerfile: Dockerfile
            target: web-runner
        restart: unless-stopped
        env_file: .env
        environment:
            TZ: Asia/Manila
            NODE_ENV: production
            INTERNAL_API_URL: http://app:3001
        ports:
            - "${WEB_PORT:-3000}:3000"
        depends_on:
            app:
                condition: service_healthy

volumes:
    db_data:
